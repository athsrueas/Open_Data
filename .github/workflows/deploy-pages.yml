name: Deploy Education Viewers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages bundle
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R viewer/educational_inequality_map _site/educational_inequality_map
          cp -R viewer/us_education_initiatives _site/us_education_initiatives
          cp viewer/index.html _site/index.html

      - name: Upload static viewer artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
