      - text: Starting from
      - emphasis [ref=e36]: 600 candidates
    - paragraph [ref=e37]: "The dataset started with roughly 600 candidates assembled from five sources: PaperDigest top-cited lists, ZetaAlpha AI rankings, OpenAlex metadata, Semantic Scholar cross-checks, and a hand-curated list of foundational pre-arXiv works — Shannon's information theory, McCulloch-Pitts neurons, Wiener's Cybernetics."
    - paragraph [ref=e38]:
      - text: Citation counts were fetched automatically via the OpenAlex API using paper IDs in the format
      - code [ref=e39]: W1234567890
      - text: . This gave the
      - code [ref=e40]: cited_by_count
      - text: field — the backbone of the scoring.
