    - paragraph [ref=e28]:
      - text: "Every few years someone publishes a \"Top AI papers\" list. Usually it's a flat ranking — a table with titles, authors, and citation counts. Useful for a quick overview, but not useful if you want to ask:"
      - emphasis [ref=e29]: Which researchers co-authored papers that introduced both a new architecture and a benchmark? Which concepts from the 1980s showed up again in the Transformer era?
    - paragraph [ref=e30]:
      - text: This project publishes 200 influential AI papers not as a list, but as a structured knowledge graph on
      - strong [ref=e31]: Geo
      - text: — a decentralized protocol for on-chain knowledge. Every entity is linked by typed relations. The result is traversable, not just searchable.
