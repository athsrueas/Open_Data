    - generic [ref=e43]: 03 · Scoring algorithm
    - heading "How 600 became 200" [level=2] [ref=e44]:
      - text: How
      - emphasis [ref=e45]: 600 became 200
    - generic [ref=e46]:
      - text: Score =
      - text: 0.55 × log(citations + 1)
      - text: 0.20 × code_present
      - text: 0.15 × benchmark_present
      - text: 0.10 × award_flag
    - paragraph [ref=e47]:
      - strong [ref=e48]: Log scale
      - text: prevents a paper with 80,000 citations from completely crowding out one with 8,000.
      - strong [ref=e49]: Code presence
      - text: is a reproducibility signal.
      - strong [ref=e50]: Benchmarks
      - text: have outsized structural influence — they define how the field measures progress.
      - strong [ref=e51]: Year normalization
      - text: corrects for citation accumulation time so 2022 papers compete fairly against 2012 ones.
    - paragraph [ref=e52]: "Raw scoring was combined with domain quotas (Deep Learning ≤ 50, NLP ≤ 30, etc.), then augmented with 26 foundational pre-arXiv works and ~24 modern papers the algorithm missed — AlphaGo, AlphaFold, NeRF, FlashAttention — each included for a specific reason: structural transformation, community consensus, or filling a domain gap visible only after applying quotas."
